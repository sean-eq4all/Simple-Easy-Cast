<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyCast Admin</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface2: #243044;
      --border: #2d3a4f;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --warning: #eab308;
      --danger: #ef4444;
      --orange: #f97316;
      --radius: 8px;
      --sidebar-w: 220px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    a, button { cursor: pointer; font-family: inherit; }

    .page { display: none; min-height: 100vh; }
    .page.active { display: block; }

    /* Auth */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f1419 0%, #1a2744 100%);
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }

    .logo {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .logo span { color: var(--primary); }

    .auth-sub { text-align: center; color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.375rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.625rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9375rem;
    }

    .form-group textarea { min-height: 80px; resize: vertical; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid transparent; }
    .btn-ghost:hover { color: var(--text); background: var(--surface2); }
    .btn-danger { background: #7f1d1d; color: #fecaca; }
    .btn-sm { padding: 0.3rem 0.625rem; font-size: 0.8125rem; }
    .btn-block { width: 100%; margin-top: 0.5rem; }

    .auth-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .auth-link a { color: var(--primary); text-decoration: none; }

    /* App shell */
    .app-shell { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1rem 0;
      flex-shrink: 0;
    }

    .sidebar .logo { font-size: 1.25rem; padding: 0 1rem 1rem; text-align: left; }

    .nav-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.625rem 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.875rem;
      border-left: 3px solid transparent;
    }

    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--primary); border-left-color: var(--primary); background: rgba(59, 130, 246, 0.1); }

    .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .topbar {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: var(--surface);
    }

    .topbar-left { display: flex; align-items: center; gap: 1rem; }

    .topbar-right { display: flex; align-items: center; gap: 0.75rem; font-size: 0.875rem; color: var(--muted); }

    .content { flex: 1; padding: 1.5rem; overflow: auto; }

    .page-title { font-size: 1.375rem; font-weight: 600; margin-bottom: 1.25rem; }

    /* Cards & stats */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .stat-card .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card h3 { font-size: 0.9375rem; margin-bottom: 1rem; }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-processing { background: #1e3a5f; color: #93c5fd; }
    .badge-ready { background: #422006; color: #fde047; }
    .badge-editing { background: #431407; color: #fdba74; }
    .badge-exported { background: #14532d; color: #86efac; }
    .badge-sent { background: #374151; color: #d1d5db; }
    .badge-failed { background: #450a0a; color: #fca5a5; }

    /* Table */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    .filter-bar input, .filter-bar select {
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.875rem;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

    th, td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th { color: var(--muted); font-weight: 500; font-size: 0.8125rem; }

    tr:hover td { background: rgba(255, 255, 255, 0.02); }

    .actions { display: flex; flex-wrap: wrap; gap: 0.375rem; }

    /* Pipeline */
    .pipeline-step {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .pipeline-step:last-child { border-bottom: none; }

    .step-icon { width: 24px; text-align: center; font-size: 0.875rem; }
    .step-icon.done { color: var(--success); }
    .step-icon.active { color: var(--primary); }
    .step-icon.wait { color: var(--muted); }

    .progress-bar {
      flex: 1;
      max-width: 200px;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }

    .tab {
      padding: 0.625rem 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.875rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .upload-progress {
      margin-top: 1rem;
      display: none;
    }

    .upload-progress.visible { display: block; }

    /* Editor */
    .editor-page { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .editor-toolbar .spacer { flex: 1; }

    .editor-toolbar label {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-left: 0.5rem;
    }

    .editor-body {
      display: grid;
      grid-template-columns: 1fr 320px;
      flex: 1;
      min-height: 0;
    }

    .preview-panel {
      display: flex;
      flex-direction: column;
      padding: 1rem;
      border-right: 1px solid var(--border);
    }

    .video-frame {
      position: relative;
      background: #000;
      border-radius: var(--radius);
      aspect-ratio: 16/9;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      background: #000 url('../KBS_News.png') center / cover no-repeat;
    }

    .subtitle-overlay {
      position: absolute;
      bottom: 9%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.92);
      color: #1e40af;
      padding: 0.4rem 1.25rem;
      border-radius: 2px;
      font-size: 0.95rem;
      font-weight: 600;
      max-width: 72%;
      text-align: center;
      border: 2px solid var(--primary);
      cursor: move;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .subtitle-overlay.hidden { display: none; }

    .playback-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .seek-bar {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: var(--surface2);
      border-radius: 3px;
    }

    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--primary);
      border-radius: 50%;
      cursor: pointer;
    }

    .props-panel {
      padding: 1rem;
      overflow-y: auto;
      background: var(--surface);
    }

    .props-panel h4 {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .props-panel .field { margin-bottom: 0.875rem; }

    .props-panel .field label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .props-panel input[type="text"],
    .props-panel input[type="number"],
    .props-panel textarea {
      width: 100%;
      padding: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.875rem;
    }

    .props-panel textarea { min-height: 60px; resize: vertical; }

    .props-panel .readonly {
      background: var(--surface2);
      color: var(--muted);
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

    .btn-group { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: 0.5rem; }

    .timeline-panel {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      background: var(--surface);
    }

    .timeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .timeline-track {
      margin-bottom: 0.5rem;
    }

    .timeline-track label {
      display: block;
      font-size: 0.6875rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .track-bar {
      height: 28px;
      background: var(--bg);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .track-video {
      height: 100%;
      background: linear-gradient(90deg, #334155 0%, #475569 100%);
      border-radius: 4px;
    }

    .track-blocks {
      display: flex;
      height: 100%;
      align-items: stretch;
      gap: 2px;
      padding: 3px;
    }

    .seg-block {
      background: #3b82f6;
      border-radius: 3px;
      font-size: 0.625rem;
      padding: 2px 4px;
      overflow: hidden;
      white-space: nowrap;
      cursor: pointer;
      opacity: 0.85;
      min-width: 40px;
    }

    .seg-block.selected { outline: 2px solid #fff; opacity: 1; }
    .seg-block:nth-child(2) { flex: 1.2; background: #2563eb; }
    .seg-block:nth-child(3) { flex: 0.9; background: #1d4ed8; }
    .seg-block:nth-child(4) { flex: 1.1; background: #1e40af; }
    .seg-block:nth-child(5) { flex: 0.8; background: #1e3a8a; }

    .track-wave {
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 2px,
        #4ade80 2px,
        #4ade80 3px
      );
      opacity: 0.4;
      border-radius: 4px;
    }

    .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #f97316;
      left: 28%;
      pointer-events: none;
      z-index: 2;
    }

    .timeline-wrap { position: relative; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      padding: 1.5rem;
    }

    .modal h3 { margin-bottom: 1rem; font-size: 1rem; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }

    .meta-row span { color: var(--muted); }

    .toolbar-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.75rem 0;
      font-size: 0.875rem;
    }

    .history-table { margin-top: 1rem; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.2s;
      z-index: 200;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 1024px) {
      .editor-body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="page-login" class="page active">
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="logo"><span>Easy</span>Cast</div>
        <p class="auth-sub">관리자 로그인</p>
        <div class="form-group">
          <label for="login-id">ID</label>
          <input id="login-id" type="text" value="admin@eq4all.kr" />
        </div>
        <div class="form-group">
          <label for="login-pw">비밀번호</label>
          <input id="login-pw" type="password" value="admin1234!" />
        </div>
        <button class="btn btn-primary btn-block" data-nav="dashboard">로그인</button>
        <p class="auth-link">계정이 없으신가요? <a href="#" data-nav="signup">회원 가입</a></p>
      </div>
    </div>
  </div>

  <!-- Signup -->
  <div id="page-signup" class="page">
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="logo"><span>Easy</span>Cast</div>
        <p class="auth-sub">관리자 회원 가입</p>
        <div class="form-group">
          <label>이름</label>
          <input type="text" value="홍길동" />
        </div>
        <div class="form-group">
          <label>이메일 (ID)</label>
          <input type="email" value="hong@eq4all.kr" />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" value="password123!" />
        </div>
        <div class="form-group">
          <label>비밀번호 확인</label>
          <input type="password" value="password123!" />
        </div>
        <button class="btn btn-primary btn-block" data-nav="dashboard">가입 완료</button>
        <p class="auth-link">이미 계정이 있으신가요? <a href="#" data-nav="login">로그인</a></p>
      </div>
    </div>
  </div>

  <!-- App shell pages -->
  <div id="page-app" class="page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="logo"><span>Easy</span>Cast</div>
        <button class="nav-item" data-nav="dashboard">대시보드</button>
        <button class="nav-item" data-nav="news-list">뉴스 목록</button>
        <button class="nav-item" data-nav="news-create">뉴스 생성</button>
        <button class="nav-item" data-nav="settings">설정</button>
      </aside>
      <div class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <input type="date" value="2026-06-25" style="padding:0.4rem 0.6rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);" />
          </div>
          <div class="topbar-right">
            <span>관리자 홍길동</span>
            <button class="btn btn-ghost btn-sm" data-nav="login">로그아웃</button>
          </div>
        </header>
        <div class="content" id="app-content"></div>
      </div>
    </div>
  </div>

  <!-- Editor (full page) -->
  <div id="page-editor" class="page editor-page">
    <div class="editor-toolbar">
      <button class="btn btn-ghost btn-sm" data-nav="news-detail">← 뉴스 상세</button>
      <button class="btn btn-secondary btn-sm" onclick="showToast('저장되었습니다.')">저장</button>
      <button class="btn btn-ghost btn-sm">되돌리기</button>
      <button class="btn btn-ghost btn-sm">다시실행</button>
      <label><input type="checkbox" id="subtitle-toggle" checked /> 자막 보이기</label>
      <div class="spacer"></div>
      <button class="btn btn-secondary btn-sm" data-nav="news-detail" data-tab="export">Export</button>
      <button class="btn btn-primary btn-sm" data-nav="news-detail" data-tab="delivery">송출</button>
    </div>
    <div class="editor-body">
      <div class="preview-panel">
        <div class="video-frame">
          <div class="video-placeholder" role="img" aria-label="KBS 뉴스 영상 프리뷰"></div>
          <div class="subtitle-overlay" id="subtitle-overlay">이번 세 달 동안 벌어들인 돈이 지금까지 중에서 가장 많다고 발표했습니다.</div>
        </div>
        <div class="playback-controls">
          <button class="btn btn-ghost btn-sm">▶</button>
          <button class="btn btn-ghost btn-sm">⏸</button>
          <span>00:01:23</span> / <span>00:05:42</span>
        </div>
        <input type="range" class="seek-bar" min="0" max="342" value="83" />
      </div>
      <div class="props-panel">
        <p style="font-size:0.75rem;color:var(--muted);margin-bottom:0.75rem;">세그먼트 #2 · 00:00:18 – 00:00:24</p>
        <h4>원문 (STT)</h4>
        <div class="field">
          <textarea class="readonly" readonly>사상 최대 규모의 분기 실적을 발표했습니다.</textarea>
        </div>
        <h4>쉬운말 (편집 가능)</h4>
        <div class="field">
          <textarea id="easy-text">이번 세 달 동안 벌어들인 돈이 지금까지 중에서 가장 많다고 발표했습니다.</textarea>
        </div>
        <div class="row-2">
          <div class="field">
            <label>위치 X</label>
            <input type="number" value="960" />
          </div>
          <div class="field">
            <label>위치 Y</label>
            <input type="number" value="880" />
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label>표시 In</label>
            <input type="text" value="00:00:18.000" />
          </div>
          <div class="field">
            <label>표시 Out</label>
            <input type="text" value="00:00:24.200" />
          </div>

    let currentView = 'dashboard';

    function navigateTo(page, options = {}) {
      document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));

      if (page === 'login' || page === 'signup') {
        document.getElementById('page-' + page).classList.add('active');
        return;
      }

      if (page === 'editor') {
        document.getElementById('page-editor').classList.add('active');
        return;
      }

      currentView = page;
      if (options.tab) currentTab = options.tab;
      else if (page !== 'news-detail') currentTab = 'overview';

      document.getElementById('page-app').classList.add('active');
      document.getElementById('app-content').innerHTML = views[page] ? views[page]() : views.dashboard();
      updateNavActive(page);
      bindNavButtons();
    }

    function updateNavActive(page) {
      document.querySelectorAll('.nav-item').forEach((el) => {
        el.classList.toggle('active', el.dataset.nav === page);
      });
    }

    function switchTab(tab) {
      currentTab = tab;
      navigateTo('news-detail');
    }

    function bindNavButtons() {
      document.querySelectorAll('[data-nav]').forEach((el) => {
        el.onclick = (e) => {
          e.preventDefault();
          const tab = el.dataset.tab;
          navigateTo(el.dataset.nav, tab ? { tab } : {});
        };
      });
    }

    function selectSeg(id) {
      const seg = segments[id];
      if (!seg) return;
      document.querySelectorAll('.seg-block').forEach((b) => b.classList.toggle('selected', Number(b.dataset.seg) === id));
      document.getElementById('subtitle-overlay').textContent = seg.easy;
      document.getElementById('easy-text').value = seg.easy;
      document.querySelector('.props-panel p').textContent = `세그먼트 #${id} · ${seg.time}`;
    }

    function openModal(short) {
      document.getElementById('modal-title').textContent = short ? '짧게 출력 재변환' : '쉬운말 재변환';
      document.getElementById('modal-short').checked = short;
      document.getElementById('modal-result').value = short

        : '정부가 오늘 새로운 경제 정책을 발표했습니다.';
      document.getElementById('reconvert-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('reconvert-modal').classList.remove('open');
    }

      document.getElementById('easy-text').value = document.getElementById('modal-result').value;
      document.getElementById('subtitle-overlay').textContent = document.getElementById('modal-result').value;
      closeModal();
      showToast('쉬운말이 적용되었습니다. TTS 재합성 대기 중…');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('subtitle-toggle').addEventListener('change', (e) => {
      document.getElementById('subtitle-overlay').classList.toggle('hidden', !e.target.checked);
    });

    document.addEventListener('click', (e) => {
      const nav = e.target.closest('[data-nav]');
      if (nav && !nav.onclick) {
        e.preventDefault();
        navigateTo(nav.dataset.nav, nav.dataset.tab ? { tab: nav.dataset.tab } : {});
      }
    });

    document.getElementById('login-pw').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigateTo('dashboard');
    });

    bindNavButtons();
    navigateTo('login');
  </script>
</body>
</html>
